services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: rag_frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped